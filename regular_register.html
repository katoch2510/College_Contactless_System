<!DOCTYPE html>
<html>
<head>
<title>Register Regular User</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">🧑‍🎓 Register Regular User</h3>

        <form method="POST">
            <div class="mb-3">
                <label>Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>

            <div class="mb-3">
                <label>Role</label>
                <select class="form-select" name="role">
                    <option>Student</option>
                    <option>Staff</option>
                    <option>Vendor</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">Start Face Registration</button>
        </form>
    </div>
</div>

</body>
</html>
