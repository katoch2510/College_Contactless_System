<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">📊 Admin Dashboard</h2>

<h4>Visitors</h4>
<table class="table table-striped table-bordered">
<tr>
<th>ID</th><th>Name</th><th>Purpose</th><th>Entry</th><th>Exit</th>
</tr>
{% for row in visitors %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
</tr>
{% endfor %}
</table>

<h4 class="mt-5">Regular Users</h4>
<table class="table table-striped table-bordered">
<tr>
<th>ID</th><th>Name</th><th>Role</th><th>Last Entry</th>
</tr>
{% for row in regulars %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>
{% endfor %}
</table>

</div>
</body>
</html>
